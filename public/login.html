<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fcfaf2; display: flex; justify-content: center; padding-top: 100px; }
        .login-box { background: white; padding: 40px; border-radius: 8px; border: 2px solid #e0d8c3; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 300px; }
        h2 { color: #b58b4c; margin-top: 0; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; background-color: #2b7a4b; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #1e5c36; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Staff Login</h2>
        <input type="text" id="username" placeholder="Username (user1)">
        <input type="password" id="password" placeholder="Password (123456)">
        <button onclick="attemptLogin()">Login</button>
        <p id="error-msg" style="color: red; text-align: center; display: none;">Invalid credentials</p>
    </div>

    <script>
        async function attemptLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });

            if (response.ok) {
                // If login works, send them to the secret admin dashboard
                window.location.href = '/admin.html';
            } else {
                // Test Case L02: Show validation message
                document.getElementById('error-msg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
